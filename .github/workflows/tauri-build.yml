name: Tauri Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release:
        description: 'Release version'
        required: false
        default: ''

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest, ubuntu-latest]
    
    runs-on: ${{ matrix.platform }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc,universal2-apple-darwin,x86_64-unknown-linux-gnu
          
      - name: Install Rust targets
        run: |
          case "${{ matrix.platform }}" in
            windows-latest)
              rustup target add x86_64-pc-windows-msvc
              ;;
            macos-latest)
              rustup target add x86_64-apple-darwin
              rustup target add aarch64-apple-darwin
              ;;
            ubuntu-latest)
              rustup target add x86_64-unknown-linux-gnu
              ;;
          esac
        shell: bash
        
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libnotify-dev libgdk-pixbuf-2.0-dev libgstreamer-plugins-base1.0-dev gstreamer1.0-plugins-good gstreamer1.0-libav gstreamer1.0-tools libssl-dev libayatana-appindicator3-dev
          
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install webkit2gtk
          
      - name: Build Tauri application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          release: ${{ inputs.release || github.ref_name }}
          tagName: ${{ inputs.release || github.ref_name }}
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-${{ matrix.platform }}
          path: src-tauri/target/release/bundle/
          retention-days: 7
          
  release:
    needs: build
    runs-on: ubuntu-latest
    if: always() && (startsWith(github.ref, 'refs/tags/') || inputs.release != '')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
          
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          name: OpenCode Desktop v${{ inputs.release || github.ref_name }}
          tag_name: ${{ inputs.release || github.ref_name }}
          body: |
            OpenCode Desktop Tauri Build
            
            **Changes:**
            - Complete migration from Electron to Tauri
            - Smaller bundle size (<10MB)
            - Lower memory usage (<100MB)
            - Faster startup (<1s)
            - Cross-platform support (Windows, macOS, Linux)
            
            **Assets:**
            - Windows: .msi installer
            - macOS: .app bundle
            - Linux: .deb package
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
