name: Tauri Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release:
        description: 'Release version'
        required: false
        default: ''

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc
          
      - name: Install Rust target
        run: rustup target add x86_64-pc-windows-msvc
          
      - name: Build Tauri application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          release: ${{ inputs.release || github.ref_name }}
          tagName: ${{ inputs.release || github.ref_name }}
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-windows
          path: src-tauri/target/release/bundle/
          retention-days: 7
          
  release:
    needs: build
    runs-on: ubuntu-latest
    if: always() && (startsWith(github.ref, 'refs/tags/') || inputs.release != '')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
          
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          name: OpenCode Desktop v${{ inputs.release || github.ref_name }}
          tag_name: ${{ inputs.release || github.ref_name }}
          body: |
            OpenCode Desktop Tauri Build - Windows Version
            
            **Changes:**
            - Complete migration from Electron to Tauri
            - Smaller bundle size (<10MB)
            - Lower memory usage (<100MB)
            - Faster startup (<1s)
            - Windows platform support
            
            **Assets:**
            - Windows: .msi installer
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
